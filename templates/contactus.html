{% extends "base.html" %}
{% load static %}
{% block title %}Contact{% endblock %}

{% block content %}
<style>
@font-face {
  font-family: 'Ovelion';
  src: url("{% static 'fonts/Ovelion-Regular.ttf' %}") format('truetype');
}
body, body * { font-family: 'Ovelion', sans-serif !important; }

:root{
  --primary:   #1B2A5E;
  --accent:    #F5C518;
  --danger:    #E03020;
  --secondary: #1A4DB5;
  --white:     #FFFFFF;
  --light-bg:  #F4F6FB;
}

/* ✅ Kill base.html dark card overrides */
.cardx,
.card,
[class*="card"] {
  background: #FFFFFF !important;
  color: #1B2A5E !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
}

body{
  margin: 0; min-height: 100vh;
  background: url("{% static 'img/SL-012322-48100-03.webp' %}") center/cover no-repeat fixed !important;
  background-color: #ffffff;
  background-blend-mode: normal;
}

/* ===== Page wrapper ===== */
.page{
  width: min(520px, 94vw);
  margin: 0 auto;
  padding: 20px 14px 60px;
  box-sizing: border-box;
}

/* ===== BASE CARD — WHITE + RED BORDER ===== */
.cardx{
  position: relative !important;
  background: #FFFFFF !important;
  border-radius: 22px !important;
  border: 2px solid rgba(224,48,32,.28) !important;
  box-shadow: 0 16px 48px rgba(27,42,94,.10), 0 0 0 1px rgba(245,197,24,.08) !important;
  overflow: hidden;
  margin-bottom: 14px;
  padding: 18px !important;
  color: #1B2A5E !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
}

/* Remove any pseudo overlays */
.cardx::before, .cardx::after { display: none !important; }

/* ===== ALL text inside cards → dark navy ===== */
.cardx, .cardx *{ color: #1B2A5E !important; text-shadow: none !important; }

/* ===== Titles ===== */
.title{
  font-weight: 950; font-size: 18px;
  letter-spacing: .04em; margin: 0 0 6px;
  color: #1B2A5E !important;
}
.sub{
  font-size: 12px; color: #64748b !important;
  margin: 0; opacity: 1 !important;
}

/* ===== Labels ===== */
label{
  display: block; font-size: 12px;
  margin: 12px 0 6px; font-weight: 900;
  color: #1B2A5E !important;
}

/* ===== Inputs & Textarea ===== */
input, textarea{
  width: 100%; box-sizing: border-box;
  border-radius: 14px;
  border: 1.5px solid rgba(27,42,94,.15) !important;
  background: #F4F6FB !important;
  color: #1B2A5E !important;
  padding: 12px 14px; outline: none;
  font-size: 14px; font-weight: 600;
}
input::placeholder, textarea::placeholder{ color: #94a3b8 !important; }
textarea{ min-height: 110px; resize: none; }
input:focus, textarea:focus{
  border-color: rgba(224,48,32,.40) !important;
  box-shadow: 0 0 0 3px rgba(224,48,32,.08) !important;
  background: #fff !important;
}

/* ===== SEND button — Navy gradient ===== */
.btn{
  width: 100%; margin-top: 14px;
  border: none; border-radius: 999px;
  padding: 15px 16px;
  font-weight: 950; letter-spacing: .12em;
  text-transform: uppercase; font-size: 14px;
  color: #fff !important;
  cursor: pointer;
  background: linear-gradient(90deg, var(--primary), var(--secondary)) !important;
  box-shadow: 0 10px 28px rgba(27,42,94,.30);
  border: 2px solid rgba(192,192,192,.35) !important;
  transition: transform .12s ease;
}
.btn:active{ transform: scale(.99); }

/* ===== Success alert ===== */
.alert-success{
  background: rgba(34,197,94,.08) !important;
  border: 1.5px solid rgba(34,197,94,.40) !important;
  color: #15803d !important;
  padding: 12px 14px; border-radius: 14px;
  font-weight: 900; margin-bottom: 14px;
  font-size: 13px; text-align: center;
}

/* ===== Telegram section ===== */
.telegram-inline{
  text-align: center; margin: 0 0 16px;
}
.tg-title{
  margin: 0 0 10px; font-weight: 950;
  font-size: 14px; color: #1B2A5E !important;
  letter-spacing: .03em; opacity: 1 !important;
}
.tg-btn{
  display: inline-flex; align-items: center; gap: 10px;
  height: 44px; padding: 0 22px;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--primary), var(--secondary)) !important;
  color: #fff !important;
  font-weight: 800; font-size: 13px;
  text-decoration: none;
  border: 2px solid rgba(192,192,192,.35) !important;
  box-shadow: 0 8px 22px rgba(27,42,94,.28);
  transition: transform .12s ease;
}
.tg-btn:active{ transform: scale(.98); }
.tg-icon{ width: 20px; height: 20px; object-fit: contain; }
.tg-text{ line-height: 1; color: #fff !important; }

/* ===== Back button — white + red border ===== */
.top-actions{
  margin-top: 6px; display: flex; justify-content: flex-start;
}
.back-btn{
  display: inline-flex; align-items: center; justify-content: center;
  height: 44px; padding: 0 26px; border-radius: 999px;
  background: #FFFFFF !important;
  color: #1B2A5E !important;
  font-weight: 900; font-size: 14px;
  text-decoration: none;
  border: 2px solid rgba(224,48,32,.30) !important;
  box-shadow: 0 4px 14px rgba(27,42,94,.12);
  transition: transform .15s ease;
}
.back-btn:hover{ transform: translateY(-1px); }
.back-btn:active{ transform: scale(.98); }

@media (max-width:520px){
  .page{ padding: 16px 12px 60px; }
  .back-btn{ height: 40px; padding: 0 20px; font-size: 13px; }
}
</style>

<div class="page">

  <!-- Telegram -->
  <div class="telegram-inline">
    <h4 class="tg-title">Telegram Contact</h4>
    <a href="https://t.me/CustomerServices24h_16868" target="_blank" class="tg-btn">
      <img src="{% static 'img/icons/telegram.png' %}" alt="Telegram" class="tg-icon">
      <span class="tg-text">Telegram</span>
    </a>
  </div>

  <!-- Header card -->
  <div class="cardx">
    <div class="title">CONTACT US</div>
    <p class="sub">Send us a message — we will contact you soon.</p>
  </div>

  {% if sent %}
    <div class="alert-success">✅ Thank you! We will contact you soon.</div>
  {% endif %}

  <!-- Form card -->
  <div class="cardx">
    <form method="POST" action="/contact/">
      {% csrf_token %}

      <label>Full name</label>
      <input type="text" name="full_name" placeholder="Enter your full name" required>

      <label>Phone / WhatsApp</label>
      <input type="tel" name="phone" placeholder="Enter phone number" required>

      <label>Subject (optional)</label>
      <input type="text" name="subject" placeholder="Enter subject">

      <label>Message</label>
      <textarea name="message" placeholder="Type your message here..." required></textarea>

      <button class="btn" type="submit">SEND MESSAGE</button>
    </form>
  </div>

  <!-- Back -->
  <div class="top-actions">
    <a class="back-btn" href="javascript:history.back()">← Back</a>
  </div>

</div>
{% endblock %}
